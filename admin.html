<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Arcade Master - Panel Admin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="top-bar"></div>
    <div class="main-container">
        <h1 style="color: #ff0055; text-align: center;">🛡️ PANNEAU ADMINISTRATEUR</h1>
        
        <div style="background: #222; padding: 20px; border: 2px solid #0ff; border-radius: 10px;">
            <h3>Modifier les pièces d'un joueur</h3>
            <input type="text" id="targetPseudo" placeholder="Pseudo exact">
            <input type="number" id="newAmount" placeholder="Nombre de pièces">
            <button onclick="validerModif()">Appliquer</button>
        </div>

        <div style="margin-top: 20px; background: #222; padding: 20px; border-radius: 10px;">
            <h3>Liste des joueurs</h3>
            <div id="listeJoueurs"></div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        function rafraichir() {
            const users = window.getUsersData();
            let html = "<table style='width:100%; color:white; border-collapse:collapse;'><tr><th>Pseudo</th><th>Pièces</th></tr>";
            for (let id in users) {
                html += `<tr><td>${users[id].username}</td><td>${users[id].coins} 💰</td></tr>`;
            }
            html += "</table>";
            document.getElementById('listeJoueurs').innerHTML = html;
        }

        function validerModif() {
            const p = document.getElementById('targetPseudo').value;
            const m = parseInt(document.getElementById('newAmount').value);
            if (window.modifyUserCoins(p, m, window.getCurrentUser())) {
                alert("Modifié !");
                rafraichir();
            } else { alert("Erreur : Pseudo introuvable"); }
        }

        // Lance la liste au chargement
        window.onload = rafraichir;
    </script>
</body>
</html>
