<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Administration - Arcade Master</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-top: 40px;
        }

        .admin-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--color-neon-pink);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.2);
        }

        th {
            color: var(--color-neon-cyan);
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid #333;
            text-transform: uppercase;
            font-size: 0.9em;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #222;
            color: #eee;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        input {
            background: #111;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 5px;
            outline: none;
        }

        input:focus { border-color: var(--color-neon-cyan); }

        .badge-admin {
            background: var(--color-neon-pink);
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.7em;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div id="top-bar"></div>

    <div class="main-container">
        <h1 style="color: var(--color-neon-pink); text-shadow: 0 0 10px var(--color-neon-pink); font-size: 2.5em;">CENTRE DE CONTRÔLE</h1>
        
        <div class="admin-grid">
            <div class="admin-card">
                <h2 style="color: var(--color-neon-cyan);">MODIFIER UN UTILISATEUR</h2>
                <div class="input-group">
                    <input type="text" id="targetUser" placeholder="Pseudo exact">
                    <input type="number" id="targetAmount" placeholder="Montant de pièces">
                    <button onclick="modifyCoins()">METTRE À JOUR</button>
                </div>
            </div>

            <div class="admin-card">
                <h2 style="color: var(--color-neon-cyan);">BASE DE DONNÉES JOUEURS</h2>
                <div id="playerListContainer">
                    </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="base.js"></script>
    <script>
        // PROTECTION : Vérifier si l'utilisateur est Admin
        function checkAdmin() {
            const user = window.getCurrentUser();
            if (!user || !user.isAdmin) {
                alert("ACCÈS REFUSÉ : Réservé au personnel autorisé.");
                window.location.href = 'index.html';
            }
        }

        function renderPlayers() {
            const db = window.getUsersData();
            const container = document.getElementById('playerListContainer');
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>ID / Pseudo</th>
                            <th>Pièces</th>
                            <th>Skins Possédés</th>
                            <th>Record Invaders</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            for (let id in db) {
                const p = db[id];
                html += `
                    <tr>
                        <td>
                            ${p.username} 
                            ${p.isAdmin ? '<span class="badge-admin">ADMIN</span>' : ''}
                        </td>
                        <td style="color:var(--color-neon-green); font-weight:bold;">${p.coins.toLocaleString()} 💰</td>
                        <td>${p.skins.owned.length}</td>
                        <td>${p.scores.invaders || 0}</td>
                    </tr>
                `;
            }

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function modifyCoins() {
            const pseudo = document.getElementById('targetUser').value.trim();
            const amount = parseInt(document.getElementById('targetAmount').value);
            const db = window.getUsersData();

            if (!pseudo || isNaN(amount)) {
                alert("Veuillez remplir les deux cases.");
                return;
            }

            // Trouver l'ID du joueur par son pseudo
            let foundId = Object.keys(db).find(id => db[id].username.toLowerCase() === pseudo.toLowerCase());

            if (foundId) {
                db[foundId].coins = amount;
                window.saveUsersDB(db);
                alert(`Succès ! ${db[foundId].username} a maintenant ${amount} pièces.`);
                
                // Si c'est l'admin lui-même qu'on modifie, on rafraîchit son affichage
                if (window.updateTopBar) window.updateTopBar();
                
                renderPlayers(); // Actualise le tableau
                document.getElementById('targetUser').value = "";
                document.getElementById('targetAmount').value = "";
            } else {
                alert("Utilisateur introuvable.");
            }
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            checkAdmin();
            renderPlayers();
        });
    </script>
</body>
</html>
