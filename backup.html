<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>REGISTRE CENTRAL - Arcade Master</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; }
        .registry-container {
            border: 2px solid #00ff41;
            background: rgba(0, 255, 65, 0.05);
            padding: 20px;
            margin-top: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        .header-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            border-bottom: 2px solid #00ff41;
            padding-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .user-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 12px 0;
            border-bottom: 1px solid #111;
            transition: 0.3s;
        }
        .user-row:hover { background: rgba(0, 255, 65, 0.1); }
        .val { color: #fff; text-shadow: 0 0 5px #00ff41; }
    </style>
</head>
<body>
    <div id="top-bar"></div>

    <div class="main-container">
        <h1 style="color: #00ff41;">CORE_DATABASE_REGISTRY</h1>
        <p>Affichage en direct des données stockées dans ce navigateur.</p>

        <div class="registry-container">
            <div class="header-row">
                <div>Pseudo</div>
                <div>Mot de Passe</div>
                <div>Solde Pièces</div>
            </div>
            <div id="display-list">
                </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="base.js"></script>
    <script>
        function updateRegistryView() {
            // Sécurité Admin
            const me = window.getCurrentUser();
            if (!me || !me.isAdmin) {
                document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:100px;'>ACCESS DENIED - ADMIN ONLY</h1>";
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                return;
            }

            const db = window.getUsersData();
            const list = document.getElementById('display-list');
            list.innerHTML = "";

            for (let id in db) {
                const u = db[id];
                list.innerHTML += `
                    <div class="user-row">
                        <div class="val">${u.username}</div>
                        <div class="val">${u.password}</div>
                        <div style="color:#00ff41">${u.coins.toLocaleString()} 💰</div>
                    </div>
                `;
            }
        }

        // Rafraîchit l'affichage toutes les 3 secondes pour voir les nouveaux joueurs
        setInterval(updateRegistryView, 3000);
        updateRegistryView();
    </script>
</body>
</html>
