<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Master - Mon Compte</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background-color: var(--color-background-medium);
            border-radius: 10px;
            border: 2px solid var(--color-neon-blue);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            text-align: center;
        }
        .form-container h2 { color: var(--color-neon-orange); margin-bottom: 20px; }
        .form-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--color-text-medium);
            border-radius: 5px;
            background-color: var(--color-background-dark);
            color: var(--color-text-light);
            box-sizing: border-box;
        }
        .form-container button { width: 100%; margin-top: 10px; }
        .status-message { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    
    <div id="top-bar"></div>
    <div id="sidebar" class="sidenav">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div id="nav-links"></div>
    </div>

    <div class="main-container" id="mainContent">
        <h1 style="color: var(--color-neon-blue); text-align: center;">GESTION DU COMPTE</h1>
        <hr>

        <div class="form-container" id="loggedInView" style="display: none;">
            <h2 style="color: var(--color-neon-green);"><i class="fas fa-user-check"></i> Profil</h2>
            <p style="color: var(--color-text-light);">Bienvenue, <strong id="usernameDisplay" style="color: var(--color-neon-orange);"></strong>.</p>
            <div style="margin-top: 20px; padding: 10px; border: 1px solid var(--color-neon-blue); border-radius: 5px;">
                <p style="color: var(--color-neon-blue);">Pièces : <strong id="coinsDisplay" style="color: var(--color-neon-green);">0</strong> 💰</p>
                <p style="color: var(--color-neon-blue);">Skin Équipé : <strong id="activeSkinDisplay" style="color: var(--color-neon-orange);">Standard</strong></p>
            </div>
            <div id="adminLinkArea"></div> <button id="logoutButton" class="btn-primary" style="background-color: var(--color-neon-red); margin-top: 25px;">
                <i class="fas fa-sign-out-alt"></i> Se Déconnecter
            </button>
        </div>

        <div id="loggedOutView" style="display: none;">
            <div class="form-container" id="loginForm">
                <h2 style="color: var(--color-neon-orange);">CONNEXION</h2>
                <input type="text" id="loginUsername" placeholder="Nom d'utilisateur" required>
                <input type="password" id="loginPassword" placeholder="Mot de passe" required>
                <button id="loginButton" class="btn-primary" style="background-color: var(--color-neon-green);">
                    <i class="fas fa-sign-in-alt"></i> Se Connecter
                </button>
                <div class="status-message" id="loginStatus"></div>
            </div>

            <div class="form-container" id="registerForm">
                <h2 style="color: var(--color-neon-blue);">INSCRIPTION</h2>
                <input type="text" id="registerUsername" placeholder="Choisir un nom d'utilisateur" required>
                <input type="password" id="registerPassword" placeholder="Choisir un mot de passe" required>
                <button id="registerButton" class="btn-primary" style="background-color: var(--color-neon-blue);">
                    <i class="fas fa-user-plus"></i> S'inscrire
                </button>
                <div class="status-message" id="registerStatus"></div>
            </div>
        </div>
    </div>
    
    <script src="base.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loggedInView = document.getElementById('loggedInView');
            const loggedOutView = document.getElementById('loggedOutView');
            const adminLinkArea = document.getElementById('adminLinkArea');

            function updateAccountView() {
                const user = window.getCurrentUser();

                if (user && user.id != 0) {
                    loggedInView.style.display = 'block';
                    loggedOutView.style.display = 'none';
                    
                    document.getElementById('usernameDisplay').textContent = user.username;
                    document.getElementById('coinsDisplay').textContent = user.coins.toLocaleString('fr-FR');
                    document.getElementById('activeSkinDisplay').textContent = (user.skins && user.skins.active) ? user.skins.active.vessel : 'Standard';

                    // Si c'est l'admin, on affiche le bouton spécial
                    if(user.isAdmin) {
                        adminLinkArea.innerHTML = `
                            <button onclick="window.location.href='admin.html'" class="btn-primary" style="background: var(--color-neon-red); margin-top:15px; border: 2px solid white;">
                                🛠️ PANNEAU ADMINISTRATEUR
                            </button>`;
                    }
                } else {
                    loggedInView.style.display = 'none';
                    loggedOutView.style.display = 'block';
                }
            }

            // CONNEXION
            document.getElementById('loginButton').addEventListener('click', () => {
                const u = document.getElementById('loginUsername').value;
                const p = document.getElementById('loginPassword').value;
                const status = document.getElementById('loginStatus');

                if (window.login(u, p)) {
                    status.style.color = 'var(--color-neon-green)';
                    status.textContent = 'Connexion...';
                    setTimeout(() => {
                        // Redirection automatique si admin, sinon reload
                        if(u === "Zelda5962") window.location.href = 'admin.html';
                        else location.reload();
                    }, 800);
                } else {
                    status.style.color = 'var(--color-neon-red)';
                    status.textContent = 'Erreur : Identifiants incorrects.';
                }
            });

            // INSCRIPTION
            document.getElementById('registerButton').addEventListener('click', () => {
                const u = document.getElementById('registerUsername').value;
                const p = document.getElementById('registerPassword').value;
                const status = document.getElementById('registerStatus');
                if (window.register(u, p)) {
                    status.style.color = 'var(--color-neon-green)';
                    status.textContent = 'Compte créé ! Connectez-vous.';
                } else {
                    status.style.color = 'var(--color-neon-red)';
                    status.textContent = 'Nom déjà pris.';
                }
            });

            // DÉCONNEXION
            document.getElementById('logoutButton').addEventListener('click', () => {
                window.logout();
                location.reload();
            });

            updateAccountView();
        });
    </script>
</body>
</html>
