<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Arcade Master - Auth</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #111; padding: 30px; border: 2px solid #00ff41; border-radius: 10px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; }
        button { width: 48%; padding: 10px; cursor: pointer; font-weight: bold; border: none; margin-top: 10px; }
        .btn-log { background: #00ff41; color: #000; }
        .btn-reg { background: transparent; border: 1px solid #00ff41; color: #00ff41; }
        #status { margin-top: 15px; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

    <div class="box">
        <h2>ARCADE AUTH</h2>
        <input type="text" id="user" placeholder="Pseudo">
        <input type="password" id="pass" placeholder="Mot de passe">
        
        <div style="display: flex; justify-content: space-between;">
            <button class="btn-reg" id="btnRegister">S'INSCRIRE</button>
            <button class="btn-log" id="btnLogin">CONNEXION</button>
        </div>
        
        <div id="status">En attente...</div>
    </div>

    <script type="module" src="auth.js"></script>

    <script type="module">
        const status = document.getElementById('status');

        // On utilise des event listeners pour être sûr que le DOM est prêt
        document.getElementById('btnRegister').addEventListener('click', async () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(!u || !p) return alert("Remplis tout !");

            status.innerText = "Création du compte Cloud...";
            const res = await window.register(u, p);
            if(res && res.success) {
                alert("Compte créé !");
                window.location.href = 'index.html';
            } else {
                status.innerText = "Erreur d'inscription.";
            }
        });

        document.getElementById('btnLogin').addEventListener('click', async () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(!u || !p) return alert("Remplis tout !");

            status.innerText = "Vérification Cloud...";
            const success = await window.login(u, p);
            if(success) {
                window.location.href = 'index.html';
            } else {
                status.innerText = "Échec de la connexion.";
            }
        });
    </script>
</body>
</html>
